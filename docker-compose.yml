# docker-compose.yml — DavaAI v5 local development
#
# Usage:
#   cp .env.example .env        # fill in your API keys
#   docker compose up --build   # starts the backend on http://localhost:8000
#
# The 'data' volume persists correction files and local bills across restarts.

version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime        # skip builder stage for fast local rebuilds
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      WORKERS: "1"           # single worker in dev (simpler debugging)
      ENVIRONMENT: "development"
    volumes:
      # Hot-reload: mount source so code changes don't need a rebuild
      - ./backend:/app
      # Persistent data: corrections and local bills survive container restarts
      - dawaai_data:/app/data
    command: >
      uvicorn main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  dawaai_data:
    driver: local
